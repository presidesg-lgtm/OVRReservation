<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Test Login</title></head>
<body>
<h2>Login (Browser Test)</h2>

<label>Username: <input id="u" value="admin"></label><br><br>
<label>Password: <input id="p" value="1234"></label><br><br>

<button id="btn">Send POST /api/login</button>

<pre id="out"></pre>

<script>
    document.getElementById("btn").addEventListener("click", async () => {
        const payload = {
            username: document.getElementById("u").value,
            password: document.getElementById("p").value
        };

        const res = await fetch("./api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const text = await res.text();
        document.getElementById("out").textContent = "HTTP " + res.status + "\n\n" + text;
    });
</script>
</body>
</html>
